<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Регистрация участника</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 32px;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 8px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .success {
            background: #10b981;
            color: white;
            padding: 14px;
            border-radius: 20px;
            margin-top: 24px;
            font-weight: 500;
            display: none;
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 20px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info {
            font-size: 12px;
            color: #888;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .field-required {
            color: #dc2626;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝  Регистрация участника</h1>
        <div class="subtitle">Пожалуйста, представьтесь для входа</div>

        <form id="registerForm">
            <div class="form-group">
16:07
<label>Фамилия <span class="field-required">*</span></label>
                <input type="text" id="lastName" placeholder="Иванов" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label>Имя <span class="field-required">*</span></label>
                <input type="text" id="firstName" placeholder="Иван" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label>Отчество</label>
                <input type="text" id="middleName" placeholder="Иванович (при наличии)" autocomplete="off">
            </div>

            <button type="submit" id="submitBtn">✅ Записаться на мероприятие</button>
        </form>

        <div id="successMessage" class="success"></div>
        <div id="errorMessage" class="error"></div>
        <div class="info">
            🔒 Нажимая кнопку, вы даёте согласие на обработку персональных данных
        </div>
    </div>

    <script>
        // === НАСТРОЙКА: сюда данные будут отправляться ===
        // Вариант 1: Google Таблицы (через Web App URL)
        // const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/ВАШ_АЙДИ/exec';
        
        // Вариант 2: Просто сохранять в localStorage и показывать скачивание
        // (пока настроен этот вариант для демо)
        
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('submitBtn');
        const successDiv = document.getElementById('successMessage');
        const errorDiv = document.getElementById('errorMessage');

        // Вспомогательные функции
        function showSuccess(text) {
            successDiv.style.display = 'block';
            successDiv.innerText = text || '✓ Вы успешно зарегистрированы! Добро пожаловать.';
            errorDiv.style.display = 'none';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        function showError(text) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = text || '❌ Ошибка. Попробуйте ещё раз или обратитесь к организатору.';
            successDiv.style.display = 'none';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Отправка...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '✅ Записаться на мероприятие';
            }
        }

        // Получить ФИО одной строкой
        function getFullName() {
            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const middleName = document.getElementById('middleName').value.trim();
            
            let fullName = `${lastName} ${firstName}`;
            if (middleName) fullName += ` ${middleName}`;
            return fullName;
        }

        // Сохранить запись в локальном хранилище (демо-режим)
        function saveToLocal(data) {
            try {
                let participants = JSON.parse(localStorage.getItem('participants') || '[]');
                data.id = Date.now();
                data.timestamp = new Date().toISOString();
                participants.push(data);
                localStorage.setItem('participants', JSON.stringify(participants));
                return true;
            } catch(e) {
                console.error(e);
                return false;
            }
        }

        // ВАРИАНТ 1: Отправка в Google Таблицы (раскомментировать и настроить GOOGLE_SCRIPT_URL)
        async function sendToGoogleSheets(data) {
            // если константа не задана — используем локальное сохранение
            if (typeof GOOGLE_SCRIPT_URL !== 'undefined' && GOOGLE_SCRIPT_URL) {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
16:07
method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        lastName: data.lastName,
                        firstName: data.firstName,
                        middleName: data.middleName || '',
                        fullName: data.fullName,
                        timestamp: new Date().toISOString()
                    })
                });
                return true;
            } else {
                // Запасной вариант: локальное сохранение
                return saveToLocal(data);
            }
        }

        // Основной обработчик отправки
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Валидация
            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            
            if (!lastName || !firstName) {
                showError('Пожалуйста, заполните фамилию и имя');
                return;
            }

            const middleName = document.getElementById('middleName').value.trim();
            const fullName = getFullName();

            // Данные для отправки
            const participantData = {
                lastName,
                firstName,
                middleName,
                fullName
            };

            setLoading(true);
            
            try {
                // Пробуем отправить
                const result = await sendToGoogleSheets(participantData);
                
                // Если успешно (или локально сохранилось)
                if (result !== false) {
                    showSuccess(`${fullName}, спасибо за регистрацию! Ждём вас.`);
                    form.reset();
                    
                    // Доп. опция: автоматически показать всех участников (для организатора)
                    // Если в URL есть параметр ?admin=1 — покажем кнопку выгрузки
                    if (window.location.search.includes('admin=1')) {
                        setTimeout(() => {
                            downloadParticipants();
                        }, 1000);
                    }
                } else {
                    showError('Не удалось сохранить. Попробуйте позже.');
                }
            } catch (err) {
                console.error(err);
                showError('Ошибка соединения. Проверьте интернет или сообщите организатору.');
            } finally {
                setLoading(false);
            }
        });

        // Функция для выгрузки данных (админская)
        function downloadParticipants() {
            const data = localStorage.getItem('participants');
            if (!data) return;
            
            const participants = JSON.parse(data);
            if (participants.length === 0) return;
            
            let csv = "ID,Фамилия,Имя,Отчество,Полное имя,Время регистрации\n";
            participants.forEach(p => {
                csv += `${p.id},${p.lastName},${p.firstName},${p.middleName || ''},${p.fullName},${p.timestamp}\n`;
            });
            
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'participants.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Если админ заходит с параметром ?admin=1 — показать кнопку выгрузки
        if (window.location.search.includes('admin=1')) {
            const adminBtn = document.createElement('button');
            adminBtn.textContent = '📥 Скачать список участников (CSV)';
16:07
adminBtn.style.marginTop = '16px';
            adminBtn.style.background = '#333';
            adminBtn.onclick = downloadParticipants;
            document.querySelector('.card').appendChild(adminBtn);
            
            // Показать подсказку
            const adminHint = document.createElement('div');
            adminHint.className = 'info';
            adminHint.style.marginTop = '12px';
            adminHint.style.background = '#f0f0f0';
            adminHint.style.padding = '8px';
            adminHint.style.borderRadius = '12px';
            adminHint.innerHTML = '🔐  Админ-режим: данные сохраняются локально в браузере. Чтобы очистить — откройте инструменты разработчика → Application → Local Storage';
            document.querySelector('.card').appendChild(adminHint);
        }
    </script>
</body>
</html>
